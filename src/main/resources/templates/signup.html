<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <title>Inscription - Loup-Garou</title>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Creepster&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@lottiefiles/dotlottie-wc@0.7.1/dist/dotlottie-wc.js" type="module"></script>
    <style>
        body {
            background: linear-gradient(135deg, #0a0e1a 0%, #1a1432 50%, #0e1828 100%);
            min-height: 100vh;
            color: #f1f5f9;
            font-family: 'Inter', sans-serif;
            padding: 2rem 0;
            margin: 0;
            position: relative;
            overflow-x: hidden;
        }

        .animation-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .signup-container {
            max-width: 600px;
            margin: 0 auto;
            padding: 0 1rem;
            position: relative;
            z-index: 1;
        }

        .brand-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .brand-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #dc2626 0%, #991b1b 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            margin: 0 auto 1rem;
            box-shadow: 0 0 30px rgba(220, 38, 38, 0.5);
        }

        .brand-title {
            font-family: 'Creepster', cursive;
            font-size: 2.5rem;
            color: #ef4444;
            text-shadow: 0 0 30px rgba(220, 38, 38, 0.8),
            0 0 60px rgba(220, 38, 38, 0.5),
            0 4px 20px rgba(0, 0, 0, 0.5);
            animation: pulse 3s ease-in-out infinite;
            letter-spacing: 0.05em;
        }

        @keyframes pulse {
            0%, 100% {
                text-shadow: 0 0 30px rgba(220, 38, 38, 0.8),
                0 0 60px rgba(220, 38, 38, 0.5),
                0 4px 20px rgba(0, 0, 0, 0.5);
            }
            50% {
                text-shadow: 0 0 40px rgba(220, 38, 38, 1),
                0 0 80px rgba(220, 38, 38, 0.7),
                0 4px 20px rgba(0, 0, 0, 0.5);
            }
        }

        .card {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5),
            0 0 0 1px rgba(255, 255, 255, 0.05) inset;
        }

        .form-control {
            background-color: rgba(10, 14, 39, 0.6);
            border: 1px solid rgba(220, 38, 38, 0.3);
            color: #ffffff;
            padding: 0.75rem 1rem;
        }

        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        .form-control:focus {
            background-color: rgba(10, 14, 39, 0.8);
            border-color: #dc2626;
            color: #ffffff;
            box-shadow: 0 0 0 0.25rem rgba(220, 38, 38, 0.25);
        }

        .avatar-selector {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
            margin-top: 1rem;
        }

        .avatar-option {
            position: relative;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .avatar-option input[type="radio"] {
            position: absolute;
            opacity: 0;
        }

        .avatar-option img {
            width: 100%;
            height: auto;
            border-radius: 50%;
            border: 3px solid rgba(220, 38, 38, 0.3);
            transition: all 0.3s ease;
        }

        .avatar-option input[type="radio"]:checked + img {
            border-color: #dc2626;
            box-shadow: 0 0 20px rgba(220, 38, 38, 0.6);
            transform: scale(1.1);
        }

        .avatar-option:hover img {
            border-color: #dc2626;
            transform: scale(1.05);
        }

        .btn-signup {
            background: linear-gradient(135deg, #dc2626 0%, #991b1b 100%);
            border: none;
            font-weight: 700;
            padding: 0.875rem;
            box-shadow: 0 8px 25px rgba(220, 38, 38, 0.4),
            0 0 40px rgba(220, 38, 38, 0.2);
            position: relative;
            overflow: hidden;
            border-radius: 16px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-signup::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.6s;
        }

        .btn-signup:hover::before {
            left: 100%;
        }

        .btn-signup:hover {
            transform: translateY(-4px) scale(1.05);
            box-shadow: 0 12px 40px rgba(220, 38, 38, 0.6),
            0 0 60px rgba(220, 38, 38, 0.4);
        }

        .btn-signup:active {
            transform: translateY(-2px) scale(1.02);
        }

        .alert-danger {
            background: rgba(220, 38, 38, 0.2);
            border-left: 4px solid #dc2626;
            color: #fca5a5;
            border-radius: 10px;
        }

        .link-custom {
            color: #dc2626;
            text-decoration: none;
            font-weight: 600;
        }

        .link-custom:hover {
            color: #fca5a5;
            text-decoration: underline;
        }

        .text-white-custom {
            color: #ffffff !important;
        }

        small.text-white-custom {
            color: #94a3b8 !important;
            opacity: 0.9;
        }

        @media (max-width: 768px) {
            .brand-title {
                font-size: 2rem;
            }
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-10px);
            }
        }

        .card {
            animation: float 4s ease-in-out infinite;
        }
    </style>
</head>
<body>
<!-- Animation Background -->
<div class="animation-background">
    <dotlottie-wc
            src="https://lottie.host/1ba847e1-f1ae-4777-858e-68d8ca042097/GPZpu9dqs6.lottie"
            speed="1"
            style="width: 150%; height: 150%; min-width: 100vw; min-height: 100vh; background-color: #10182c"
            mode="forward"
            loop
            autoplay>
    </dotlottie-wc>
</div>

<div class="signup-container">
    <!-- Brand Header -->
    <div class="brand-header">
        <div class="brand-icon">🐺</div>
        <h1 class="brand-title">Inscription</h1>
        <p class="text-white-custom">Rejoignez la meute !</p>
    </div>

    <!-- Error Alert -->
    <div th:if="${error}" class="alert alert-danger alert-dismissible fade show mb-4" role="alert">
        <i class="bi bi-exclamation-triangle-fill me-2"></i>
        <span th:text="${error}">Error message</span>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="alert"></button>
    </div>

    <!-- Signup Form -->
    <div class="card">
        <div class="card-body p-4">
            <form method="post" th:action="@{/signup}">
                <!-- Username -->
                <div class="mb-3">
                    <label class="form-label">
                        <i class="bi bi-person me-2"></i><b>Nom d'utilisateur</b>
                    </label>
                    <input
                            type="text"
                            name="username"
                            class="form-control form-control-lg"
                            placeholder="Choisissez un username"
                            required
                            minlength="3"
                            autofocus/>
                    <small class="text-white-custom">Minimum 3 caractères</small>
                </div>

                <!-- Password -->
                <div class="mb-4">
                    <label class="form-label">
                        <i class="bi bi-lock me-2"></i> <b>Mot de passe</b>
                    </label>
                    <input
                            type="password"
                            name="password"
                            class="form-control form-control-lg"
                            placeholder="Créez un mot de passe"
                            required
                            minlength="4"/>
                    <small class="text-white-custom">Minimum 4 caractères</small>
                </div>

                <!-- Avatar Selection -->
                <div class="mb-4">
                    <label class="form-label">
                        <i class="bi bi-image me-2"></i> <b>Choisissez votre avatar </b>
                    </label>
                    <div class="avatar-selector">
                        <label class="avatar-option">
                            <input type="radio" name="avatar" value="avatar1.png" checked/>
                            <img th:src="@{/avatars/avatar1.png}" alt="Avatar 1"/>
                        </label>
                        <label class="avatar-option">
                            <input type="radio" name="avatar" value="avatar2.png"/>
                            <img th:src="@{/avatars/avatar2.png}" alt="Avatar 2"/>
                        </label>
                        <label class="avatar-option">
                            <input type="radio" name="avatar" value="avatar3.png"/>
                            <img th:src="@{/avatars/avatar3.png}" alt="Avatar 3"/>
                        </label>
                        <label class="avatar-option">
                            <input type="radio" name="avatar" value="avatar4.png"/>
                            <img th:src="@{/avatars/avatar4.png}" alt="Avatar 4"/>
                        </label>
                        <label class="avatar-option">
                            <input type="radio" name="avatar" value="avatar5.png"/>
                            <img th:src="@{/avatars/avatar5.png}" alt="Avatar 5"/>
                        </label>
                        <label class="avatar-option">
                            <input type="radio" name="avatar" value="avatar6.png"/>
                            <img th:src="@{/avatars/avatar6.png}" alt="Avatar 6"/>
                        </label>
                        <label class="avatar-option">
                            <input type="radio" name="avatar" value="avatar7.png"/>
                            <img th:src="@{/avatars/avatar7.png}" alt="Avatar 7"/>
                        </label>
                        <label class="avatar-option">
                            <input type="radio" name="avatar" value="avatar8.png"/>
                            <img th:src="@{/avatars/avatar8.png}" alt="Avatar 8"/>
                        </label>
                    </div>
                </div>

                <button class="btn btn-primary btn-signup w-100 mb-3" type="submit">
                    <i class="bi bi-person-plus me-2"></i>Créer mon compte
                </button>
            </form>

            <hr class="my-4" style="border-color: rgba(220, 38, 38, 0.3);"/>

            <div class="text-center">
                <p class="text-white-custom mb-2">
                    Vous avez déjà un compte ?
                </p>
                <a class="link-custom" th:href="@{/login}">
                    <i class="bi bi-box-arrow-in-right me-2"></i>Se connecter
                </a>
            </div>
        </div>
    </div>

    <!-- Back to Home -->
    <div class="text-center mt-4">
        <a class="link-custom" th:href="@{/}">
            <i class="bi bi-arrow-left me-2"></i>Retour à l'accueil
        </a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
