<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="layout(title, content)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} ?: 'Loup-Garou'">Loup-Garou</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Creepster&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <!-- Custom CSS -->
    <style>
        :root {
            --primary-dark: #0a0e27;
            --secondary-dark: #1a1f3a;
            --card-bg: rgba(26, 31, 58, 0.85);
            --accent-red: #dc2626;
            --accent-orange: #f97316;
            --accent-purple: #7c3aed;
            --text-light: #f1f5f9;
            --text-muted: #94a3b8;
            --border-color: rgba(220, 38, 38, 0.3);
            --success: #10b981;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, var(--primary-dark) 0%, #1e1b4b 100%);
            min-height: 100vh;
            color: var(--text-light);
            font-family: 'Inter', sans-serif;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image:
                    radial-gradient(circle at 20% 50%, rgba(220, 38, 38, 0.1) 0%, transparent 50%),
                    radial-gradient(circle at 80% 80%, rgba(124, 58, 237, 0.1) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .main-container {
            position: relative;
            z-index: 1;
        }

        /* Navbar */
        .navbar {
            background-color: rgba(10, 14, 39, 0.95) !important;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            border-bottom: 1px solid var(--border-color);
        }

        .navbar-brand {
            font-family: 'Creepster', cursive;
            font-size: 1.8rem;
            color: var(--accent-red) !important;
            text-shadow: 0 0 10px rgba(220, 38, 38, 0.5);
            transition: all 0.3s ease;
        }

        .navbar-brand:hover {
            text-shadow: 0 0 20px rgba(220, 38, 38, 0.8);
            transform: scale(1.05);
        }

        .nav-link {
            color: var(--text-light) !important;
            font-weight: 500;
            transition: all 0.3s ease;
            position: relative;
        }

        .nav-link::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 50%;
            width: 0;
            height: 2px;
            background: var(--accent-red);
            transition: all 0.3s ease;
            transform: translateX(-50%);
        }

        .nav-link:hover::after {
            width: 80%;
        }

        /* Cards */
        .card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 15px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px rgba(220, 38, 38, 0.3);
            border-color: var(--accent-red);
        }

        .card-header {
            background: rgba(220, 38, 38, 0.1);
            border-bottom: 1px solid var(--border-color);
            font-weight: 600;
        }

        /* Buttons */
        .btn-primary {
            background: linear-gradient(135deg, var(--accent-red) 0%, #991b1b 100%);
            border: none;
            font-weight: 600;
            padding: 0.75rem 2rem;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(220, 38, 38, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(220, 38, 38, 0.5);
            background: linear-gradient(135deg, #991b1b 0%, var(--accent-red) 100%);
        }

        .btn-secondary {
            background: rgba(124, 58, 237, 0.2);
            border: 1px solid var(--accent-purple);
            color: var(--text-light);
            font-weight: 600;
        }

        .btn-secondary:hover {
            background: var(--accent-purple);
            border-color: var(--accent-purple);
            transform: translateY(-2px);
        }

        .btn-success {
            background: var(--success);
            border: none;
        }

        /* Form Controls */
        .form-control, .form-select {
            background-color: rgba(10, 14, 39, 0.6);
            border: 1px solid var(--border-color);
            color: var(--text-light);
            padding: 0.75rem;
            transition: all 0.3s ease;
        }

        .form-control:focus, .form-select:focus {
            background-color: rgba(10, 14, 39, 0.8);
            border-color: var(--accent-red);
            color: var(--text-light);
            box-shadow: 0 0 0 0.25rem rgba(220, 38, 38, 0.25);
        }

        .form-control::placeholder {
            color: var(--text-muted);
        }

        .form-label {
            color: var(--text-light);
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        /* Badges & Pills */
        .badge {
            padding: 0.5em 1em;
            border-radius: 20px;
            font-weight: 600;
        }

        .badge.bg-danger {
            background: var(--accent-red) !important;
        }

        .badge.bg-success {
            background: var(--success) !important;
        }

        /* Alerts */
        .alert {
            border-radius: 10px;
            border: none;
            backdrop-filter: blur(10px);
        }

        .alert-danger {
            background: rgba(220, 38, 38, 0.2);
            border-left: 4px solid var(--accent-red);
            color: #fca5a5;
        }

        .alert-success {
            background: rgba(16, 185, 129, 0.2);
            border-left: 4px solid var(--success);
            color: #6ee7b7;
        }

        .alert-info {
            background: rgba(124, 58, 237, 0.2);
            border-left: 4px solid var(--accent-purple);
            color: #c4b5fd;
        }

        /* Avatar */
        .avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: 2px solid var(--accent-red);
            object-fit: cover;
            transition: all 0.3s ease;
        }

        .avatar:hover {
            transform: scale(1.1);
            box-shadow: 0 0 20px rgba(220, 38, 38, 0.5);
        }

        .avatar.big {
            width: 80px;
            height: 80px;
        }

        /* Moon Icon Animation */
        .moon-icon {
            display: inline-block;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        /* Link */
        .link-custom {
            color: var(--accent-red);
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .link-custom:hover {
            color: #fca5a5;
            text-decoration: underline;
        }

        /* Footer */
        .footer {
            margin-top: 4rem;
            padding: 2rem 0;
            text-align: center;
            color: var(--text-muted);
            border-top: 1px solid var(--border-color);
        }

        /* Text Utilities */
        .text-muted {
            color: var(--text-muted) !important;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .navbar-brand {
                font-size: 1.5rem;
            }

            .card {
                margin-bottom: 1rem;
            }
        }
    </style>
</head>
<body>
<!-- Navigation -->
<nav class="navbar navbar-expand-lg navbar-dark mb-4">
    <div class="container-fluid">
        <a class="navbar-brand" th:href="@{/}">
            <i class="bi bi-moon-stars-fill moon-icon me-2"></i>
            Loup-Garou
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto align-items-center">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/}">
                        <i class="bi bi-house-door me-1"></i>Accueil
                    </a>
                </li>
                <li class="nav-item" th:if="${session.me != null}">
                    <a class="nav-link" th:href="@{/play}">
                        <i class="bi bi-controller me-1"></i>Jouer
                    </a>
                </li>
                <li class="nav-item d-flex align-items-center ms-3" th:if="${session.me != null}">
                    <img class="avatar me-2" th:src="@{|/avatars/${session.me.avatar}|}" alt="avatar"/>
                    <span class="nav-link mb-0" th:text="${session.me.username}">Player</span>
                </li>
                <li class="nav-item" th:if="${session.me != null}">
                    <form method="post" th:action="@{/logout}" class="d-inline">
                        <button class="btn btn-link nav-link" type="submit">
                            <i class="bi bi-box-arrow-right me-1"></i>Déconnexion
                        </button>
                    </form>
                </li>
                <li class="nav-item" th:if="${session.me == null}">
                    <a class="nav-link" th:href="@{/login}">
                        <i class="bi bi-box-arrow-in-right me-1"></i>Connexion
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- Main Content -->
<div class="main-container">
    <div class="container py-4">
        <!-- Alerts -->
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <i class="bi bi-exclamation-triangle-fill me-2"></i>
            <span th:text="${error}">Error message</span>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="alert"></button>
        </div>

        <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
            <i class="bi bi-check-circle-fill me-2"></i>
            <span th:text="${success}">Success message</span>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="alert"></button>
        </div>

        <div th:if="${info}" class="alert alert-info alert-dismissible fade show" role="alert">
            <i class="bi bi-info-circle-fill me-2"></i>
            <span th:text="${info}">Info message</span>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="alert"></button>
        </div>

        <!-- Page Content -->
        <th:block th:replace="${content}"></th:block>
    </div>
</div>

<!-- Footer -->
<footer class="footer">
    <div class="container">
        <p class="mb-0">
            <i class="bi bi-moon-stars me-2"></i>
            Loup-Garou Web Game &copy; 2024
        </p>
        <p class="mb-0 mt-2">
            <small>H2 Console: <code>/h2</code></small>
        </p>
    </div>
</footer>

<!-- Bootstrap 5 JS Bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- Custom JavaScript -->
<script>
    // Auto-dismiss alerts after 5 seconds
    setTimeout(function() {
        const alerts = document.querySelectorAll('.alert');
        alerts.forEach(alert => {
            const bsAlert = new bootstrap.Alert(alert);
            bsAlert.close();
        });
    }, 5000);
</script>
</body>
</html>
