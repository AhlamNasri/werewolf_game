<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <title>Loup-Garou - Accueil</title>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Creepster&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <script src="https://unpkg.com/@lottiefiles/dotlottie-wc@0.7.1/dist/dotlottie-wc.js" type="module"></script>
    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0e1a 0%, #1a1432 50%, #0e1828 100%);
            color: #f1f5f9;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            position: relative;
            overflow-x: hidden;
        }

        .animation-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .content-wrapper {
            position: relative;
            z-index: 1;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 2rem 1rem;
        }

        .hero-title {
            font-family: 'Creepster', cursive;
            font-size: 3.5rem;
            color: #ef4444;
            text-shadow: 0 0 30px rgba(220, 38, 38, 0.8),
                         0 0 60px rgba(220, 38, 38, 0.5),
                         0 4px 20px rgba(0, 0, 0, 0.5);
            margin: 0;
            padding-top: 1rem;
            animation: pulse 3s ease-in-out infinite;
            letter-spacing: 0.05em;
        }

        @keyframes pulse {
            0%, 100% {
                text-shadow: 0 0 30px rgba(220, 38, 38, 0.8),
                             0 0 60px rgba(220, 38, 38, 0.5),
                             0 4px 20px rgba(0, 0, 0, 0.5);
            }
            50% {
                text-shadow: 0 0 40px rgba(220, 38, 38, 1),
                             0 0 80px rgba(220, 38, 38, 0.7),
                             0 4px 20px rgba(0, 0, 0, 0.5);
            }
        }

        .buttons-container {
            width: 100%;
            max-width: 600px;
            padding-bottom: 1rem;
            backdrop-filter: blur(10px);
            background: rgba(0, 0, 0, 0.3);
            border-radius: 24px;
            padding: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5),
                        0 0 0 1px rgba(255, 255, 255, 0.05) inset;
        }

        .btn-play {
            background: linear-gradient(135deg, #dc2626 0%, #991b1b 100%);
            border: none;
            color: #ffffff;
            font-weight: 700;
            font-size: 1.5rem;
            padding: 1rem 3rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 8px 25px rgba(220, 38, 38, 0.4),
                        0 0 40px rgba(220, 38, 38, 0.2);
            position: relative;
            overflow: hidden;
            border-radius: 16px;
        }

        .btn-play::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.6s;
        }

        .btn-play:hover::before {
            left: 100%;
        }

        .btn-play:hover {
            transform: translateY(-4px) scale(1.05);
            box-shadow: 0 12px 40px rgba(220, 38, 38, 0.6),
                        0 0 60px rgba(220, 38, 38, 0.4);
            color: #ffffff;
        }

        .btn-play:active {
            transform: translateY(-2px) scale(1.02);
        }

        .btn-outline-light {
            color: #f1f5f9;
            border: 2px solid #64748b;
            background: rgba(100, 116, 139, 0.1);
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
            border-radius: 14px;
            padding: 0.6rem 1.5rem;
            font-weight: 600;
        }

        .btn-outline-light:hover {
            background: linear-gradient(135deg, #475569 0%, #334155 100%);
            border-color: #94a3b8;
            color: #ffffff;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(71, 85, 105, 0.4);
        }

        .btn-outline-danger {
            color: #fca5a5;
            border: 2px solid #dc2626;
            background: rgba(220, 38, 38, 0.1);
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
            border-radius: 14px;
            padding: 0.6rem 1.5rem;
            font-weight: 600;
        }

        .btn-outline-danger:hover {
            background: linear-gradient(135deg, #dc2626 0%, #991b1b 100%);
            border-color: #ef4444;
            color: #ffffff;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(220, 38, 38, 0.4);
        }

        .avatar {
            border-radius: 50%;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(220, 38, 38, 0.4);
        }

        .avatar:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 25px rgba(220, 38, 38, 0.6);
        }

        small {
            color: #94a3b8 !important;
        }

        .d-flex.align-items-center.justify-content-between {
            background: rgba(255, 255, 255, 0.05);
            padding: 1rem;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .d-flex.align-items-center.justify-content-between:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.15);
        }

        @media (max-width: 768px) {
            .hero-title {
                font-size: 2.5rem;
            }

            .btn-play {
                font-size: 1.25rem;
                padding: 0.875rem 2rem;
            }

            .buttons-container {
                padding: 1.5rem;
            }
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-10px);
            }
        }

        .buttons-container {
            animation: float 4s ease-in-out infinite;
        }
    </style>
</head>
<body>
<!-- Animation Background -->
<div class="animation-background">
    <dotlottie-wc
            src="https://lottie.host/1ba847e1-f1ae-4777-858e-68d8ca042097/GPZpu9dqs6.lottie"
            speed="1"
            style="width: 150%; height: 150%; min-width: 100vw; min-height: 100vh; background-color: #10182c"
            mode="forward"
            loop
            autoplay>
    </dotlottie-wc>
</div>

<!-- Content -->
<div class="content-wrapper">
    <h1 class="hero-title">Loup-Garou</h1>

    <div class="buttons-container">
        <div class="d-flex justify-content-center mb-4">
            <a class="btn btn-primary btn-play" th:href="@{/play}">
                <i class="bi bi-controller me-2"></i>Jouer Maintenant
            </a>
        </div>

        <div th:if="${me == null}" class="d-flex gap-3 justify-content-center flex-wrap">
            <a class="btn btn-outline-light" th:href="@{/login}">
                <i class="bi bi-box-arrow-in-right me-2"></i>Se connecter
            </a>
            <a class="btn btn-outline-light" th:href="@{/signup}">
                <i class="bi bi-person-plus me-2"></i>S'inscrire
            </a>
        </div>

        <div th:if="${me != null}" class="d-flex align-items-center justify-content-between flex-wrap gap-3">
            <div class="d-flex align-items-center">
                <img class="avatar me-3" th:src="@{|/avatars/${me.avatar}|}" alt="avatar"
                     style="width: 60px; height: 60px; border: 3px solid #dc2626;"/>
                <div class="text-start">
                    <div class="fw-bold fs-5" th:text="${me.username}">Username</div>
                    <small class="text-muted">Connecté</small>
                </div>
            </div>
            <form method="post" th:action="@{/logout}">
                <button class="btn btn-outline-danger" type="submit">
                    <i class="bi bi-box-arrow-right me-2"></i>Déconnexion
                </button>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
