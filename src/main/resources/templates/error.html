<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <title>Erreur - Loup-Garou</title>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Creepster&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #0a0e27 0%, #1e1b4b 100%);
            min-height: 100vh;
            color: #f1f5f9;
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .error-container {
            text-align: center;
            max-width: 600px;
        }

        .error-icon {
            width: 150px;
            height: 150px;
            background: linear-gradient(135deg, #dc2626 0%, #991b1b 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 5rem;
            margin: 0 auto 2rem;
            box-shadow: 0 0 40px rgba(220, 38, 38, 0.5);
            animation: shake 0.5s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .error-title {
            font-family: 'Creepster', cursive;
            font-size: 3rem;
            color: #dc2626;
            text-shadow: 0 0 20px rgba(220, 38, 38, 0.5);
            margin-bottom: 1rem;
        }

        .card {
            background: rgba(26, 31, 58, 0.85);
            border: 1px solid rgba(220, 38, 38, 0.3);
            border-radius: 15px;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            padding: 2rem;
            margin-top: 2rem;
        }

        .error-message {
            background: rgba(220, 38, 38, 0.1);
            border: 1px solid rgba(220, 38, 38, 0.3);
            border-radius: 10px;
            padding: 1.5rem;
            color: #fca5a5;
            font-size: 1.1rem;
            margin: 2rem 0;
        }

        .btn-home {
            background: linear-gradient(135deg, #dc2626 0%, #991b1b 100%);
            border: none;
            font-weight: 700;
            padding: 1rem 2rem;
            font-size: 1.1rem;
            box-shadow: 0 4px 15px rgba(220, 38, 38, 0.3);
            transition: all 0.3s ease;
        }

        .btn-home:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(220, 38, 38, 0.5);
        }

        .wolf-crying {
            font-size: 4rem;
            opacity: 0.3;
            margin-top: 2rem;
        }
    </style>
</head>
<body>
<div class="error-container">
    <div class="error-icon">
        <i class="bi bi-exclamation-triangle-fill"></i>
    </div>

    <h1 class="error-title">Oups !</h1>

    <p class="lead text-muted">Une erreur est survenue</p>

    <div class="card">
        <div class="error-message">
            <i class="bi bi-x-circle-fill me-2"></i>
            <span th:text="${message} ?: 'Une erreur inattendue s\'est produite'">
          Message d'erreur
        </span>
        </div>

        <a class="btn btn-primary btn-home" th:href="@{/}">
            <i class="bi bi-house-door-fill me-2"></i>Retour à l'Accueil
        </a>

        <div class="wolf-crying">
            🐺💔
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
