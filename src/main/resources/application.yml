server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:file:./data/werewolf;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driverClassName: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: true
    properties:
      hibernate:
        format_sql: true
  thymeleaf:
    cache: false
  h2:
    console:
      enabled: true
      path: /h2

  # DevTools configuration
  devtools:
    restart:
      enabled: true
      additional-paths: src/main/java,src/main/resources
    livereload:
      enabled: true
      port: 35729

# Simple defaults (seconds)
werewolf:
  phase:
    wolves: 60
    seer: 45
    witch: 60
    chat: 90
    vote: 45